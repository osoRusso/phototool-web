<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PhotoTool · Leitor de Dorsais</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a18;padding:2rem;max-width:700px;margin:0 auto}
h2{font-size:20px;font-weight:600;margin-bottom:.25rem}
p.sub{font-size:14px;color:#666;margin-bottom:1.75rem}
.card{background:#fff;border:.5px solid #e0e0dc;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card h3{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.btn{font-size:13px;padding:6px 14px;border:.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer}
.btn:hover{background:#f1f1ee}
.btn.primary{background:#378ADD;color:#fff;border-color:#378ADD;font-size:14px;padding:8px 20px}
.btn.primary:hover{background:#185FA5}
.btn:disabled{opacity:.4;cursor:not-allowed}
input[type=file]{display:none}
#dropzone{border:1.5px dashed #ccc;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:background .15s}
#dropzone:hover{background:#f1f1ee}
#dropzone p{font-size:14px;color:#666}
#status-bar{display:none;margin-top:1rem}
.prog-label{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:5px}
progress{width:100%;height:6px;border-radius:3px;border:none;appearance:none}
progress::-webkit-progress-bar{background:#e0e0dc;border-radius:3px}
progress::-webkit-progress-value{background:#378ADD;border-radius:3px;transition:width .3s}
#results-wrap{display:none}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.toolbar span{font-size:13px;color:#666}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:.5px solid #e0e0dc;border-radius:10px;overflow:hidden}
th{text-align:left;padding:8px 10px;font-weight:500;color:#888;font-size:12px;border-bottom:.5px solid #e0e0dc;background:#fafaf8}
td{padding:7px 10px;border-bottom:.5px solid #f0f0ec;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td img{height:36px;border-radius:4px;vertical-align:middle;border:.5px solid #ddd}
td.num{font-weight:700;font-size:16px}
td.num.none{color:#aaa;font-size:13px;font-weight:400}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge.ok{background:#EAF3DE;color:#3B6D11}
.badge.none{background:#f1f0ea;color:#777}
.badge.err{background:#FCEBEB;color:#A32D2D}
#reset-btn{margin-top:1rem}
</style>
</head>
<body>
<h2>🔢 PhotoTool — Leitor de Dorsais</h2>
<p class="sub">Carregue os recortes para processar. A leitura é feita automaticamente pela nossa API segura.</p>

<div class="card">
  <h3>Arquivos de Recorte</h3>
  <div id="dropzone" onclick="document.getElementById('files-inp').click()">
    <p>📂 Clique ou arraste os recortes aqui</p>
    <p style="font-size:12px;margin-top:4px">JPG, PNG · várias imagens de uma vez</p>
  </div>
  <input type="file" id="files-inp" multiple accept="image/*">
  <div id="files-tag" style="font-size:13px;color:#666;margin-top:.5rem"></div>
</div>

<button class="btn primary" id="btn-run" disabled onclick="run()">Processar e Ler Dorsais</button>

<div id="status-bar">
  <div class="prog-label">
    <span id="prog-text"></span>
    <span id="prog-count"></span>
  </div>
  <progress id="prog" value="0" max="100"></progress>
</div>

<div id="results-wrap" style="margin-top:1.25rem">
  <div class="toolbar">
    <span id="summary"></span>
    <button class="btn primary" onclick="downloadCSV()">⬇ Baixar CSV</button>
  </div>
  <table>
    <thead><tr><th>Recorte</th><th>Preview</th><th>Dorsal</th><th>Estado</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <button class="btn" id="reset-btn" onclick="resetUI()">Processar novos recortes</button>
</div>

<script>
let files = [], results = [];

// ── Ficheiros ───────────────────────────────────────────
const dzEl = document.getElementById('dropzone');
const inp = document.getElementById('files-inp');
inp.addEventListener('change', e => setFiles(Array.from(e.target.files)));
dzEl.addEventListener('dragover', e => { e.preventDefault(); dzEl.style.background='#f1f1ee'; });
dzEl.addEventListener('dragleave', () => dzEl.style.background='');
dzEl.addEventListener('drop', e => {
  e.preventDefault(); dzEl.style.background='';
  setFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

function setFiles(f) {
  files = f;
  document.getElementById('files-tag').textContent = files.length + ' imagens selecionadas';
  checkReady();
}

function checkReady() {
  // Agora só precisamos verificar se há arquivos, pois a API Key está no backend
  document.getElementById('btn-run').disabled = files.length === 0;
}

// ── API (Comunicação com o nosso Backend na Vercel) ─────
async function callGemini(imageBase64, mimeType) {
  // Fazemos um POST para a nossa própria rota /api/ler-dorsal
  const resp = await fetch('/api/ler-dorsal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      image: imageBase64, 
      mimeType: mimeType 
    })
  });

  if (!resp.ok) {
    throw new Error('Erro de conexão com o servidor PhotoTool.');
  }

  const data = await resp.json();
  
  if (data.status === 'err') {
    throw new Error(data.error || 'Erro no processamento da imagem.');
  }

  return data; // Retorna o objeto {numero: "142", status: "ok"} ou {numero: "Sem número", status: "none"}
}

// ── Processamento ───────────────────────────────────────
async function run() {
  results = [];
  document.getElementById('btn-run').disabled = true;
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('status-bar').style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    setProgress(i, files.length, files[i].name);
    await processFile(files[i]);
    // Delay de segurança menor (o backend agora é mais robusto)
    if (i < files.length - 1) await sleep(300);
  }

  setProgress(files.length, files.length, 'Concluído!');
  const ok = results.filter(r => r.status==='ok').length;
  const none = results.filter(r => r.status==='none').length;
  const err = results.filter(r => r.status==='err').length;
  document.getElementById('summary').textContent =
    files.length + ' recortes · ' + ok + ' com número · ' + none + ' sem número' + (err ? ' · ' + err + ' erros' : '');
  document.getElementById('results-wrap').style.display = 'block';
  document.getElementById('btn-run').disabled = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function processFile(file) {
  let number = null, status = 'ok', previewUrl = '', errorMsg = '';
  try {
    previewUrl = URL.createObjectURL(file);
    const b64 = await fileToBase64(file);
    const mimeType = file.type || 'image/jpeg';
    
    // Chama o nosso servidor Python
    const apiResult = await callGemini(b64, mimeType);
    
    if (apiResult.status === 'ok') {
      number = apiResult.numero;
      status = 'ok';
    } else if (apiResult.status === 'none') {
      status = 'none';
    }

  } catch(e) {
    status = 'err';
    errorMsg = e.message || String(e);
    console.error(file.name, 'ERROR:', errorMsg);
  }

  results.push({ name: file.name, number, status, error: errorMsg });
  addRow(file.name, number, status, previewUrl, errorMsg);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── UI ──────────────────────────────────────────────────
function addRow(name, number, status, previewUrl, error) {
  const tbody = document.getElementById('tbody');
  const tr = document.createElement('tr');
  const map = { ok:['ok','Detetado'], none:['none','Sem número'], err:['err','Erro'] };
  const [cls, label] = map[status] || map.err;
  const numCell = number
    ? `<td class="num">${number}</td>`
    : `<td class="num none" title="${error || ''}">${error ? '⚠ ' + error.substring(0,30) : '—'}</td>`;
  tr.innerHTML = `
    <td title="${name}" style="max-width:180px">${name}</td>
    <td><img src="${previewUrl}" alt=""></td>
    ${numCell}
    <td><span class="badge ${cls}">${label}</span></td>`;
  tbody.appendChild(tr);
}

function setProgress(done, total, label) {
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog').value = pct;
  document.getElementById('prog-text').textContent = label;
  document.getElementById('prog-count').textContent = done + ' / ' + total;
}

function downloadCSV() {
  const grouped = {};
  for (const r of results) {
    if (!r.number) continue;
    const orig = r.name.replace(/_det\d+/i, '').replace(/\.(jpg|jpeg|png)$/i, (m) => m.toUpperCase());
    if (!grouped[orig]) grouped[orig] = [];
    if (!grouped[orig].includes(r.number)) {
      grouped[orig].push(r.number);
    }
  }
  
  const lines = ['filename;number'];
  for (const [filename, numbers] of Object.entries(grouped)) {
    lines.push(filename + ';' + numbers.join(' '));
  }
  const uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(lines.join('\n'));
  const a = document.createElement('a');
  a.href = uri; a.download = 'dorsais.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function resetUI() {
  files = []; results = [];
  document.getElementById('results-wrap').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
  document.getElementById('files-tag').textContent = '';
  document.getElementById('files-inp').value = '';
  document.getElementById('btn-run').disabled = true;
}
</script>
</body>
</html>
